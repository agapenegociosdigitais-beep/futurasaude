<!DOCTYPE html>
<html>
<head>
  <title>Teste de Autenticação</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #f0f0f0; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    .status { margin: 20px 0; padding: 15px; border-radius: 4px; }
    .ok { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .erro { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    button { padding: 10px 20px; margin: 10px 5px 10px 0; cursor: pointer; }
    pre { background: #f5f5f5; padding: 10px; overflow: auto; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Teste de Autenticação</h1>

    <button onclick="verificarCookies()">1️⃣ Verificar Cookies</button>
    <button onclick="verificarSessao()">2️⃣ Verificar Sessão</button>
    <button onclick="verificarPerfil()">3️⃣ Verificar Perfil</button>
    <button onclick="limparCookies()">🗑️ Limpar Cookies</button>

    <div id="resultado"></div>
  </div>

  <script>
    function mostrar(titulo, dados, tipo = 'info') {
      const res = document.getElementById('resultado');
      const html = `
        <div class="status ${tipo}">
          <h3>${titulo}</h3>
          <pre>${JSON.stringify(dados, null, 2)}</pre>
        </div>
      `;
      res.innerHTML = html + res.innerHTML;
    }

    async function verificarCookies() {
      mostrar('🍪 Cookies Encontrados', {
        cookies: document.cookie || '(nenhum)'
      }, 'info');
    }

    async function verificarSessao() {
      try {
        const res = await fetch('/api/debug/auth');
        const data = await res.json();
        mostrar('📊 Status da Sessão', data, data.logado ? 'ok' : 'erro');
      } catch (err) {
        mostrar('❌ Erro ao verificar sessão', { erro: err.message }, 'erro');
      }
    }

    async function verificarPerfil() {
      try {
        const res = await fetch('/api/debug/auth');
        const data = await res.json();

        if (!data.logado) {
          mostrar('⚠️ Sem Sessão', { mensagem: 'Você precisa fazer login primeiro' }, 'erro');
          return;
        }

        if (data.perfilError) {
          mostrar('❌ Erro ao Buscar Perfil', data, 'erro');
        } else {
          mostrar('✅ Perfil do Usuário', data.perfil, 'ok');
        }
      } catch (err) {
        mostrar('❌ Erro', { erro: err.message }, 'erro');
      }
    }

    function limparCookies() {
      document.cookie.split(';').forEach(c => {
        const eqPos = c.indexOf('=');
        const name = eqPos > -1 ? c.substr(0, eqPos).trim() : c.trim();
        document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
      });
      mostrar('🗑️ Cookies Limpos', { mensagem: 'Todos os cookies foram removidos' }, 'info');
    }
  </script>
</body>
</html>
